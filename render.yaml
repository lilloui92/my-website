services:
  - type: web
    name: family-world-cup-predictions
    env: node
    plan: free
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: GITHUB_STATE_TOKEN
        sync: false
      - key: GITHUB_STATE_BRANCH
        value: game-state
      - key: STATE_PATH
        value: /tmp/state.json
